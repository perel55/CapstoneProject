{% load static %}

{% include 'barangay_secretary/secretary_nav.html' %}

    {% block css %}
    <link rel="stylesheet" href="{% static 'css/secretary.css' %}">
    {% endblock %}

<body>
    <div class="update-form-container">
        <h1 class="update-form-title">Update Service: {{ service.service_name }}</h1>
        <form method="POST" enctype="multipart/form-data" class="update-service-form">
            {% csrf_token %}
            <div class="form-group">
                <label for="service_name">Service Name:</label>
                <input type="text" id="service_name" name="service_name" value="{{ service.service_name }}" required class="update-input">
            </div>
            <div class="form-group">
                <label for="requirements">Requirements:</label>
                <input type="text" id="requirements" name="requirements" value="{{ service.requirements }}" required class="update-input">
            </div>
            <div class="form-group">
                <label for="service_description">Description:</label>
                <textarea id="service_description" name="service_description" required class="update-textarea">{{ service.service_description }}</textarea>
            </div>
            <div class="form-group">
                <label for="service_price">Price:</label>
                <input type="number" id="service_price" name="service_price" value="{{ service.service_price }}" required class="update-input">
            </div>
            <div class="form-group">
                <label for="image">Service Image:</label>
                <input type="file" id="image" name="image" class="update-input">
                {% if service.image %}
                    <p>Current Image:</p>
                    <img src="{{ service.image.url }}" alt="{{ service.service_name }}" width="200">
                {% endif %}
            </div>
            <button type="submit" class="btn update-btn" onclick="return confirmUpdate()">Update Service</button>
        </form>
        <a href="{% url 'service_list' %}" class="btn cancel-btn">Cancel</a>
    </div>
</body>

<script>
    function confirmUpdate() {
        return confirm("Are you sure you want to update this service?");
    }
</script>
